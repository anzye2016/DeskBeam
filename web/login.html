<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DeskBeam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0A0A0A;
  color: #D4D4D4;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 280px;
}
h1 {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #71717A;
  text-align: center;
  margin-bottom: 8px;
}
input {
  width: 100%;
  padding: 10px 14px;
  background: #121212;
  border: 1px solid #2A2A2A;
  color: #EAEAEA;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}
input:focus { border-color: #3B82F6; }
button {
  width: 100%;
  height: 40px;
  border: 1px solid #3B82F6;
  background: #121212;
  color: #3B82F6;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
}
button:active { background: #3B82F6; color: #0A0A0A; }
</style>
</head>
<body>
<form method="get" action="/login">
  <h1>DeskBeam</h1>
  <input type="password" name="token" placeholder="Token" autofocus>
  <button type="submit">Enter</button>
</form>
</body>
</html>
